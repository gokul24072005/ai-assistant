<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital AI Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:95%;
    max-width:1100px;
    height:92vh;
    background:#fff;
    border-radius:25px;
    overflow:hidden;
    display:flex;
    box-shadow:0 20px 60px rgba(0,0,0,.35);
}

.sidebar{
    width:280px;
    background:#0f172a;
    color:white;
    padding:25px;
}

.logo{
    font-size:24px;
    font-weight:700;
    margin-bottom:30px;
}

.menu-item{
    padding:14px;
    margin-bottom:10px;
    border-radius:12px;
    background:rgba(255,255,255,.05);
}

.menu-item:hover{
    background:rgba(255,255,255,.12);
}

.chat-section{
    flex:1;
    display:flex;
    flex-direction:column;
}

.header{
    background:white;
    padding:20px 30px;
    border-bottom:1px solid #e5e7eb;
}

.header h2{
    color:#111827;
}

.header p{
    color:#64748b;
}

.chat-box{
    flex:1;
    padding:25px;
    overflow-y:auto;
    background:#f8fafc;
}

.message{
    display:flex;
    margin-bottom:15px;
}

.user{
    justify-content:flex-end;
}

.bot{
    justify-content:flex-start;
}

.bubble{
    max-width:75%;
    padding:14px 18px;
    border-radius:18px;
    line-height:1.6;
    animation:fadeIn .3s ease;
}

.user .bubble{
    background:#2563eb;
    color:white;
    border-bottom-right-radius:5px;
}

.bot .bubble{
    background:white;
    border:1px solid #e2e8f0;
    color:#111827;
    border-bottom-left-radius:5px;
}

.input-area{
    display:flex;
    padding:20px;
    border-top:1px solid #e5e7eb;
    background:white;
}

#message{
    flex:1;
    padding:15px;
    border:1px solid #d1d5db;
    border-radius:14px;
    font-size:15px;
    outline:none;
}

#message:focus{
    border-color:#2563eb;
}

button{
    margin-left:10px;
    padding:15px 30px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-weight:600;
}

button:hover{
    background:#1d4ed8;
}

.welcome{
    text-align:center;
    margin-top:80px;
    color:#64748b;
}

.welcome h1{
    color:#111827;
    margin-bottom:10px;
}

.typing{
    display:flex;
    gap:5px;
}

.typing span{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#2563eb;
    animation:bounce 1.4s infinite;
}

.typing span:nth-child(2){
    animation-delay:.2s;
}

.typing span:nth-child(3){
    animation-delay:.4s;
}

@keyframes bounce{
    0%,80%,100%{
        transform:scale(0);
    }
    40%{
        transform:scale(1);
    }
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:768px){

    .sidebar{
        display:none;
    }

    .container{
        width:100%;
        height:100vh;
        border-radius:0;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="sidebar">
        <div class="logo">
            🏥 Hospital AI
        </div>

        <div class="menu-item">📅 Appointments</div>
        <div class="menu-item">👨‍⚕️ Doctors</div>
        <div class="menu-item">🧑 Patients</div>
        <div class="menu-item">💳 Billing</div>
        <div class="menu-item">📋 Medical Records</div>
        <div class="menu-item">📊 Reports</div>
    </div>

    <div class="chat-section">

        <div class="header">
            <h2>Hospital Management Assistant</h2>
            <p>Connected to Zoho Creator & n8n AI Agent</p>
        </div>

        <div class="chat-box" id="chatBox">

            <div class="welcome">
                <h1>👋 Welcome</h1>
                <p>
                    Ask me about appointments, patients,
                    doctors, schedules, billing, reports and more.
                </p>
            </div>

        </div>

        <div class="input-area">

            <input
                id="message"
                type="text"
                placeholder="Ask something..."
            >

            <button onclick="sendMessage()">
                Send
            </button>

        </div>

    </div>

</div>

<script>

const chatBox = document.getElementById('chatBox');

function addMessage(text,type){

    const div = document.createElement('div');

    div.className = `message ${type}`;

    div.innerHTML = `
        <div class="bubble">${text}</div>
    `;

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

async function sendMessage(){

    const input = document.getElementById('message');
    const message = input.value.trim();

    if(!message) return;

    addMessage(message,'user');

    input.value='';

    const loading = document.createElement('div');

    loading.className='message bot';
    loading.id='loading';

    loading.innerHTML=`
        <div class="bubble">
            <div class="typing">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    `;

    chatBox.appendChild(loading);

    try{

        const response = await fetch('https://gokul2407.app.n8n.cloud/webhook-test/ai-assistance',{

            method:'POST',

            headers:{
                'Content-Type':'application/json'
            },

            body:JSON.stringify({
                message:message
            })

        });

        const data = await response.json();

        document.getElementById('loading').remove();

        addMessage(
            data.response ||
            data.output ||
            JSON.stringify(data),
            'bot'
        );

    }catch(error){

        document.getElementById('loading').remove();

        addMessage(
            '❌ Unable to connect to Hospital AI Assistant.',
            'bot'
        );
    }
}

document
.getElementById('message')
.addEventListener('keypress',function(e){

    if(e.key==='Enter'){
        sendMessage();
    }

});

</script>

</body>
</html>
